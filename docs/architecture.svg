<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowEsc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect width="1000" height="700" fill="#f8fafc"/>
  <text x="500" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Crisis Companion — Architecture</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#475569">Slack Agent for Good · deterministic guidance, retrieval over messages + files, MCP-curated resources, live escalation</text>
  <text x="970" y="58" text-anchor="end" font-size="11" fill="#0e7490">Deployed on Railway · Socket Mode · always-on for judging</text>

  <!-- Slack workspace -->
  <rect x="30" y="90" width="250" height="430" rx="12" fill="#ffffff" stroke="#4a154b" stroke-width="2"/>
  <text x="155" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#4a154b">Slack Workspace (sandbox)</text>

  <rect x="50" y="135" width="210" height="58" rx="8" fill="#f4f0f4" stroke="#4a154b"/>
  <text x="155" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">#debriefs-anon</text>
  <text x="155" y="176" text-anchor="middle" font-size="11" fill="#475569">allow-listed · @mention triggers agent</text>

  <rect x="50" y="203" width="210" height="58" rx="8" fill="#f4f0f4" stroke="#4a154b"/>
  <text x="155" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">DM · Assistant thread ✨</text>
  <text x="155" y="244" text-anchor="middle" font-size="11" fill="#475569">live-session support, either surface</text>

  <rect x="50" y="271" width="210" height="58" rx="8" fill="#f4f0f4" stroke="#4a154b"/>
  <text x="155" y="294" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">App Home</text>
  <text x="155" y="312" text-anchor="middle" font-size="11" fill="#475569">shift dashboard + protocols modal</text>

  <rect x="50" y="339" width="210" height="58" rx="8" fill="#fff7ed" stroke="#c2410c"/>
  <text x="155" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">#crisis-resources</text>
  <text x="155" y="380" text-anchor="middle" font-size="11" fill="#9a3412">supervisor / shift-lead alerts</text>

  <text x="155" y="418" text-anchor="middle" font-size="11" fill="#475569">events + action_token</text>
  <text x="155" y="434" text-anchor="middle" font-size="11" fill="#475569">via Socket Mode</text>

  <!-- Agent -->
  <rect x="360" y="90" width="290" height="430" rx="12" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="505" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Crisis Companion Agent</text>
  <text x="505" y="136" text-anchor="middle" font-size="11" fill="#475569">Node.js · Bolt Assistant class · Socket Mode</text>

  <rect x="380" y="150" width="250" height="50" rx="8" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="505" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">1 · PII scrub</text>
  <text x="505" y="188" text-anchor="middle" font-size="11" fill="#475569">names · phones · emails · ages · IDs</text>

  <rect x="380" y="210" width="250" height="50" rx="8" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="505" y="230" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">2 · Deterministic classifier</text>
  <text x="505" y="248" text-anchor="middle" font-size="11" fill="#475569">crisis type + intensity, lexicon-based</text>

  <rect x="380" y="270" width="250" height="50" rx="8" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="505" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">3 · Parallel retrieval</text>
  <text x="505" y="308" text-anchor="middle" font-size="11" fill="#475569">search (msgs+files) · helplines · protocol</text>

  <rect x="380" y="330" width="250" height="50" rx="8" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="505" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">4 · Block Kit reply</text>
  <text x="505" y="368" text-anchor="middle" font-size="11" fill="#475569">phrases · past cases · resources · ✅❌🚨</text>

  <rect x="380" y="390" width="250" height="50" rx="8" fill="#fff7ed" stroke="#c2410c"/>
  <text x="505" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">5 · Escalate</text>
  <text x="505" y="428" text-anchor="middle" font-size="11" fill="#9a3412">manual click, or automatic if time-critical</text>

  <!-- RTS API -->
  <rect x="720" y="90" width="250" height="140" rx="12" fill="#ffffff" stroke="#0e7490" stroke-width="2"/>
  <text x="845" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#0e7490">Real-time Search API</text>
  <text x="845" y="140" text-anchor="middle" font-size="12" fill="#0f172a">assistant.search.context</text>
  <text x="845" y="160" text-anchor="middle" font-size="11" fill="#475569">semantic search over the team's own</text>
  <text x="845" y="176" text-anchor="middle" font-size="11" fill="#475569">anonymised debrief history — messages</text>
  <text x="845" y="192" text-anchor="middle" font-size="11" fill="#475569">and shared training-material files</text>
  <text x="845" y="212" text-anchor="middle" font-size="11" fill="#475569">results re-filtered by channel allow-list</text>

  <!-- MCP -->
  <rect x="720" y="250" width="250" height="230" rx="12" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <text x="845" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">MCP Server (stdio)</text>
  <text x="845" y="296" text-anchor="middle" font-size="11" fill="#475569">crisis-resources · separate process</text>
  <rect x="740" y="308" width="210" height="36" rx="8" fill="#fffbeb" stroke="#b45309"/>
  <text x="845" y="331" text-anchor="middle" font-size="12" fill="#0f172a">find_helplines(country, type)</text>
  <rect x="740" y="352" width="210" height="36" rx="8" fill="#fffbeb" stroke="#b45309"/>
  <text x="845" y="375" text-anchor="middle" font-size="12" fill="#0f172a">get_protocol(type)</text>
  <rect x="740" y="396" width="210" height="36" rx="8" fill="#fffbeb" stroke="#b45309"/>
  <text x="845" y="419" text-anchor="middle" font-size="12" fill="#0f172a">list_protocols()</text>
  <text x="845" y="454" text-anchor="middle" font-size="11" fill="#475569">curated, vetted directory</text>
  <text x="845" y="470" text-anchor="middle" font-size="11" fill="#475569">(9 countries + intl)</text>

  <!-- Arrows -->
  <line x1="280" y1="290" x2="360" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="330" x2="280" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="278" text-anchor="middle" font-size="10" fill="#475569">message</text>
  <text x="320" y="348" text-anchor="middle" font-size="10" fill="#475569">reply</text>

  <line x1="650" y1="180" x2="720" y2="150" stroke="#0e7490" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="688" y="155" text-anchor="middle" font-size="10" fill="#0e7490">scrubbed query</text>
  <text x="688" y="168" text-anchor="middle" font-size="10" fill="#0e7490">+ action_token</text>

  <line x1="650" y1="330" x2="720" y2="340" stroke="#b45309" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="685" y="322" text-anchor="middle" font-size="10" fill="#b45309">MCP tool calls</text>

  <line x1="380" y1="415" x2="260" y2="368" stroke="#c2410c" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowEsc)"/>
  <text x="300" y="400" text-anchor="middle" font-size="10" fill="#c2410c">live alert +</text>
  <text x="300" y="412" text-anchor="middle" font-size="10" fill="#c2410c">join-thread link</text>

  <!-- Privacy strip -->
  <rect x="30" y="560" width="940" height="120" rx="12" fill="#0f172a"/>
  <text x="500" y="590" text-anchor="middle" font-size="15" font-weight="700" fill="#f8fafc">🔒 Privacy guardrails (enforced in code, on every message)</text>
  <text x="140" y="625" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">Channel allow-list</text>
  <text x="140" y="645" text-anchor="middle" font-size="11" fill="#94a3b8">search + replies restricted</text>
  <text x="380" y="625" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">PII scrubbed pre-search</text>
  <text x="380" y="645" text-anchor="middle" font-size="11" fill="#94a3b8">nothing identifying leaves the thread</text>
  <text x="620" y="625" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">Zero storage</text>
  <text x="620" y="645" text-anchor="middle" font-size="11" fill="#94a3b8">no DB, stats in-memory only</text>
  <text x="860" y="625" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">No generative AI</text>
  <text x="860" y="645" text-anchor="middle" font-size="11" fill="#94a3b8">vetted library → zero hallucination</text>
</svg>
