<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1000" height="620" fill="#f8fafc"/>
  <text x="500" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Crisis Companion — Architecture</text>
  <text x="500" y="60" text-anchor="middle" font-size="13" fill="#475569">Slack Agent for Good · deterministic guidance, retrieval-powered memory, MCP-curated resources</text>

  <!-- Slack workspace -->
  <rect x="30" y="90" width="250" height="330" rx="12" fill="#ffffff" stroke="#4a154b" stroke-width="2"/>
  <text x="155" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#4a154b">Slack Workspace (sandbox)</text>

  <rect x="50" y="135" width="210" height="70" rx="8" fill="#f4f0f4" stroke="#4a154b"/>
  <text x="155" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">#debriefs-anon</text>
  <text x="155" y="178" text-anchor="middle" font-size="11" fill="#475569">allow-listed, anonymised</text>
  <text x="155" y="193" text-anchor="middle" font-size="11" fill="#475569">@mention triggers the agent</text>

  <rect x="50" y="215" width="210" height="60" rx="8" fill="#f4f0f4" stroke="#4a154b"/>
  <text x="155" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Assistant thread ✨</text>
  <text x="155" y="256" text-anchor="middle" font-size="11" fill="#475569">private, live-session support</text>

  <rect x="50" y="285" width="210" height="60" rx="8" fill="#f4f0f4" stroke="#4a154b"/>
  <text x="155" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">App Home</text>
  <text x="155" y="326" text-anchor="middle" font-size="11" fill="#475569">Your Shift Dashboard</text>

  <text x="155" y="380" text-anchor="middle" font-size="11" fill="#475569">events + action_token</text>
  <text x="155" y="396" text-anchor="middle" font-size="11" fill="#475569">via Socket Mode</text>

  <!-- Agent -->
  <rect x="360" y="90" width="290" height="330" rx="12" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="505" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Crisis Companion Agent</text>
  <text x="505" y="136" text-anchor="middle" font-size="11" fill="#475569">Node.js · Bolt Assistant class · Socket Mode</text>

  <rect x="380" y="150" width="250" height="52" rx="8" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="505" y="171" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">1 · PII scrub</text>
  <text x="505" y="189" text-anchor="middle" font-size="11" fill="#475569">names · phones · emails · ages · IDs</text>

  <rect x="380" y="214" width="250" height="52" rx="8" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="505" y="235" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">2 · Deterministic classifier</text>
  <text x="505" y="253" text-anchor="middle" font-size="11" fill="#475569">crisis type + intensity, lexicon-based</text>

  <rect x="380" y="278" width="250" height="52" rx="8" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="505" y="299" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">3 · Parallel retrieval</text>
  <text x="505" y="317" text-anchor="middle" font-size="11" fill="#475569">search + helplines + protocol</text>

  <rect x="380" y="342" width="250" height="52" rx="8" fill="#eff6ff" stroke="#1d4ed8"/>
  <text x="505" y="363" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">4 · Block Kit reply</text>
  <text x="505" y="381" text-anchor="middle" font-size="11" fill="#475569">vetted phrases · past cases · resources</text>

  <!-- RTS API -->
  <rect x="720" y="90" width="250" height="120" rx="12" fill="#ffffff" stroke="#0e7490" stroke-width="2"/>
  <text x="845" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#0e7490">Real-time Search API</text>
  <text x="845" y="140" text-anchor="middle" font-size="12" fill="#0f172a">assistant.search.context</text>
  <text x="845" y="160" text-anchor="middle" font-size="11" fill="#475569">semantic search over the team's own</text>
  <text x="845" y="176" text-anchor="middle" font-size="11" fill="#475569">anonymised debrief history</text>
  <text x="845" y="196" text-anchor="middle" font-size="11" fill="#475569">results re-filtered by channel allow-list</text>

  <!-- MCP -->
  <rect x="720" y="250" width="250" height="170" rx="12" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <text x="845" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">MCP Server (stdio)</text>
  <text x="845" y="296" text-anchor="middle" font-size="11" fill="#475569">crisis-resources · separate process</text>
  <rect x="740" y="310" width="210" height="40" rx="8" fill="#fffbeb" stroke="#b45309"/>
  <text x="845" y="335" text-anchor="middle" font-size="12" fill="#0f172a">find_helplines(country, type)</text>
  <rect x="740" y="358" width="210" height="40" rx="8" fill="#fffbeb" stroke="#b45309"/>
  <text x="845" y="383" text-anchor="middle" font-size="12" fill="#0f172a">get_protocol(type)</text>
  <text x="845" y="412" text-anchor="middle" font-size="11" fill="#475569">curated, vetted directory (9 countries + intl)</text>

  <!-- Arrows -->
  <line x1="280" y1="200" x2="360" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="240" x2="280" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="188" text-anchor="middle" font-size="10" fill="#475569">message</text>
  <text x="320" y="258" text-anchor="middle" font-size="10" fill="#475569">reply</text>

  <line x1="650" y1="170" x2="720" y2="150" stroke="#0e7490" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="688" y="145" text-anchor="middle" font-size="10" fill="#0e7490">scrubbed query</text>
  <text x="688" y="158" text-anchor="middle" font-size="10" fill="#0e7490">+ action_token</text>

  <line x1="650" y1="320" x2="720" y2="330" stroke="#b45309" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="685" y="312" text-anchor="middle" font-size="10" fill="#b45309">MCP tool calls</text>

  <!-- Privacy strip -->
  <rect x="30" y="460" width="940" height="120" rx="12" fill="#0f172a"/>
  <text x="500" y="490" text-anchor="middle" font-size="15" font-weight="700" fill="#f8fafc">🔒 Privacy guardrails (enforced in code, on every message)</text>
  <text x="140" y="525" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">Channel allow-list</text>
  <text x="140" y="545" text-anchor="middle" font-size="11" fill="#94a3b8">search + replies restricted</text>
  <text x="380" y="525" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">PII scrubbed pre-search</text>
  <text x="380" y="545" text-anchor="middle" font-size="11" fill="#94a3b8">nothing identifying leaves the thread</text>
  <text x="620" y="525" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">Zero storage</text>
  <text x="620" y="545" text-anchor="middle" font-size="11" fill="#94a3b8">no DB, stats in-memory only</text>
  <text x="860" y="525" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">No generative AI</text>
  <text x="860" y="545" text-anchor="middle" font-size="11" fill="#94a3b8">vetted library → zero hallucination</text>
</svg>
